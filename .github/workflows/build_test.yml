name: Python package - UV

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

concurrency:
  # cancels superseded runs
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LATEST_PY_VERSION: "3.14"
  REDIS: "redis://localhost:6379"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Python ${{ env.LATEST_PY_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.LATEST_PY_VERSION }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.LATEST_PY_VERSION }}
      - name: Lint
        run: |
          uv run nox -e lint
      - run: uv sync --all-groups
      - run: uv run nox -e smoke

  check-others:
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            python-version: "3.14"
          #- os: windows-latest
          #  python-version: '3.14'
          - os: ubuntu-latest
            python-version: "pypy3.11"
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Test and Coverage
        run: |
          uv run nox -e notlinux

  check-linux:
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.14", "3.14t"]
        os: [ubuntu-latest]
    services:
      pyrate_redis:
        image: redis:7
        ports:
          - 6379:6379
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      pyrate_postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-groups
      # Run linting (latest python version only)
      - name: Build and install package
        if: ${{ matrix.python-version == env.LATEST_PY_VERSION && matrix.os == 'ubuntu-latest' }}
        run: |
          uv build
          uv pip install dist/*.whl
      # Run tests and coverage report (all python versions)
      - name: Test and Coverage
        run: |
          uv run nox -e cover
      # Latest python version: send coverage report to codecov
      - name: "Upload coverage report to Codecov"
        if: ${{ matrix.python-version == env.LATEST_PY_VERSION && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v2

      - name: Upload dist, if this is latest
        if: ${{ matrix.python-version == env.LATEST_PY_VERSION && matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  redis-pressure:
    if: github.event_name == 'pull_request'
    needs: smoke
    runs-on: ubuntu-latest
    env:
      REDIS_CPU_LIMIT: "1"
      REDIS_MEMORY_LIMIT: "512 MiB"
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
          --cpuset-cpus 0
          --memory 512m
          --memory-swap 512m
    steps:
      - name: Check out PR merge commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Python ${{ env.LATEST_PY_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.LATEST_PY_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.LATEST_PY_VERSION }}
      - name: Prepare comparison checkouts
        run: |
          git worktree add --detach /tmp/pyrate-baseline ${{ github.event.pull_request.base.sha }}
          git worktree add --detach /tmp/pyrate-candidate ${{ github.event.pull_request.head.sha }}
      - name: Run Redis pressure benchmark
        run: |
          taskset -c 1 uv run --group all python benchmarks/compare_redis_pressure.py \
            --baseline /tmp/pyrate-baseline \
            --candidate /tmp/pyrate-candidate \
            --json-output redis-pressure.json \
            --markdown-output redis-pressure.md
          cat redis-pressure.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Redis pressure results
        uses: actions/upload-artifact@v6
        with:
          name: redis-pressure-${{ github.run_id }}
          path: |
            redis-pressure.json
            redis-pressure.md

  publish:
    needs: [check-linux, check-others]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
